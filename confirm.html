<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Complete Your Booking · Drizzle Ballers</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #002244;
    --green: #69BE28;
    --gray: #8B8B8B;
    --silver: #A5ACAF;
    --white: #FFFFFF;
    --dark: #0a0f1a;
    --card-bg: #0d1829;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .confirm-card {
    background: var(--card-bg);
    border: 1px solid rgba(105,190,40,0.25);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 480px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    margin-bottom: 1.5rem;
  }
  .logo span { color: var(--green); }

  .check-icon {
    width: 64px; height: 64px;
    background: rgba(105,190,40,0.12);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.2rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    margin-bottom: 0.4rem;
  }
  h1 span { color: var(--green); }

  .confirm-sub {
    color: var(--silver);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .summary-box {
    background: var(--dark);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .label { color: var(--gray); font-weight: 700; }
  .summary-row .value { color: var(--white); font-weight: 800; }
  .summary-row.total .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    color: var(--green);
  }
  .savings-badge {
    display: inline-block;
    background: rgba(105,190,40,0.12);
    border: 1px solid rgba(105,190,40,0.25);
    color: var(--green);
    font-size: 0.7rem;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 0.2rem 0.6rem;
    border-radius: 50px;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  .pay-btn {
    display: block;
    width: 100%;
    background: var(--green);
    color: var(--navy);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
    padding: 1rem;
    border-radius: 8px;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 20px rgba(105,190,40,0.3);
    margin-bottom: 0.8rem;
  }
  .pay-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  .back-link {
    display: block;
    color: var(--gray);
    font-size: 0.82rem;
    text-decoration: none;
    margin-top: 0.5rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--silver); }

  .secure-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    color: var(--gray);
    font-size: 0.75rem;
    margin-top: 1.2rem;
  }
</style>
</head>
<body>

<div class="confirm-card">
  <div class="logo">Drizzle <span>Ballers</span></div>

  <div class="check-icon">📅</div>
  <h1>Class <span>Booked!</span></h1>
  <p class="confirm-sub">Your spot is reserved. Complete payment below to confirm your booking — it only takes a few seconds.</p>

  <div class="summary-box">
    <div class="summary-row">
      <span class="label">Program</span>
      <span class="value" id="conf-program">Group Class</span>
    </div>
    <div class="summary-row">
      <span class="label">Kids</span>
      <span class="value" id="conf-kids">1 kid</span>
    </div>
    <div class="summary-row total">
      <span class="label">Total</span>
      <span class="value" id="conf-total">$35</span>
    </div>
  </div>

  <a id="pay-btn" href="#" class="pay-btn">💳 Complete Payment →</a>
  <a href="index.html" class="back-link">← Back to Drizzle Ballers</a>

  <div class="secure-note">
    🔒 Secure payment powered by Stripe
  </div>
</div>

<script>
const STRIPE_LINKS = {
  1: 'https://buy.stripe.com/14AdR8ajPfBCfwQd6x8N201',
  2: 'https://buy.stripe.com/9B6cN4ajPcpq3O81nP8N202',
  3: 'https://buy.stripe.com/fZubJ0dw1fBC0BW1nP8N203',
  4: 'https://buy.stripe.com/dRm14meA5dtu5Wg2rT8N204',
  5: 'https://buy.stripe.com/00w14m9fLahi4Sc3vX8N205'
};
const PRICES  = { 1: 35, 2: 65, 3: 90, 4: 110, 5: 120 };
const SAVINGS = { 1: 0,  2: 5,  3: 15, 4: 30,  5: 55  };

const params = new URLSearchParams(window.location.search);
const kids   = Math.min(5, Math.max(1, parseInt(params.get('kids')) || 1));

document.getElementById('conf-kids').textContent  = kids === 1 ? '1 kid' : `${kids} kids`;
document.getElementById('conf-total').innerHTML   =
  `$${PRICES[kids]}${SAVINGS[kids] > 0 ? `<span class="savings-badge">Save $${SAVINGS[kids]}</span>` : ''}`;
document.getElementById('pay-btn').href = STRIPE_LINKS[kids];
document.getElementById('conf-program').textContent = 'Group Class · 1h 15min';
</script>
</body>
</html>
